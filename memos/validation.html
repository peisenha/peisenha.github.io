    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --primary-color: #1a365d;
            --accent-color: #2c5282;
            --text-color: #2d3748;
            --text-light: #4a5568;
            --background: #f7fafc;
            --card-background: #ffffff;
            --border-color: #e2e8f0;
            --hover-color: #edf2f7;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            line-height: 1.7;
            color: var(--text-color);
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            background-attachment: fixed;
            padding: 40px 20px;
        }

        .container {
            max-width: 900px;
            margin: 0 auto;
            background-color: var(--card-background);
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            animation: fadeIn 0.6s ease-out;
        }

        nav {
            background: linear-gradient(135deg, var(--primary-color), var(--accent-color));
            padding: 20px 60px;
            position: sticky;
            top: 0;
            z-index: 100;
            backdrop-filter: blur(10px);
        }

        nav ul {
            list-style: none;
            display: flex;
            gap: 30px;
            flex-wrap: wrap;
            justify-content: center;
            margin: 0;
            padding: 0;
        }

        nav li {
            margin: 0;
            padding: 0;
        }

        nav li::before {
            content: none;
        }

        nav a {
            color: white;
            text-decoration: none;
            font-weight: 500;
            font-size: 0.95em;
            padding: 8px 16px;
            border-radius: 6px;
            transition: all 0.3s ease;
            letter-spacing: 0.3px;
        }

        nav a:hover {
            background-color: rgba(255,255,255,0.15);
            transform: translateY(-2px);
        }

        .content {
            padding: 60px 80px 80px;
        }

        header {
            margin-bottom: 50px;
            padding-bottom: 30px;
            border-bottom: 3px solid var(--border-color);
            position: relative;
        }

        header::after {
            content: '';
            position: absolute;
            bottom: -3px;
            left: 0;
            width: 120px;
            height: 3px;
            background: linear-gradient(90deg, var(--primary-color), var(--accent-color));
        }

        h1 {
            font-family: 'Crimson Pro', Georgia, serif;
            font-size: 3em;
            font-weight: 600;
            margin-bottom: 15px;
            color: var(--primary-color);
            letter-spacing: -0.5px;
        }

        .subtitle {
            font-size: 1.1em;
            color: var(--text-light);
            line-height: 1.8;
        }

        p {
            margin-bottom: 18px;
            color: var(--text-light);
            line-height: 1.8;
        }

        .back-link {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            margin-top: 40px;
            padding: 12px 24px;
            background-color: var(--hover-color);
            border-radius: 8px;
            color: var(--accent-color);
            text-decoration: none;
            font-weight: 500;
            transition: all 0.3s ease;
            border: 2px solid transparent;
        }

        .back-link:hover {
            background-color: var(--accent-color);
            color: white;
            border-color: var(--accent-color);
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(44, 82, 130, 0.3);
        }

        a {
            color: var(--accent-color);
            text-decoration: none;
            border-bottom: 2px solid transparent;
            transition: all 0.3s ease;
            font-weight: 500;
        }

        a:hover {
            color: var(--primary-color);
            border-bottom-color: var(--accent-color);
        }

        @media (max-width: 768px) {
            body {
                padding: 20px 10px;
            }

            .container {
                border-radius: 8px;
            }

            nav {
                padding: 15px 20px;
            }

            nav ul {
                gap: 15px;
            }

            nav a {
                font-size: 0.85em;
                padding: 6px 12px;
            }

            .content {
                padding: 40px 30px;
            }

            h1 {
                font-size: 2.2em;
            }
        }

        @media (max-width: 480px) {
            body {
                padding: 10px;
            }

            .content {
                padding: 30px 20px;
            }

            h1 {
                font-size: 1.8em;
            }
        }

        html {
            scroll-behavior: smooth;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
    </style>
</head>

        </div>
    </div>
